name: TestFlight

on:
  workflow_dispatch:

env:
  BUNDLE_PREFIX: com.soheil.openglasses
  APP_GROUP: group.com.soheil.openglasses

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Rewrite app group in sources
        run: |
          grep -rl "group.com.openglasses.app" --include="*.swift" --include="*.plist" . | while read -r f; do
            sed -i '' "s|group\.com\.openglasses\.app|${APP_GROUP}|g" "$f"
          done

      - name: Write personal entitlements
        run: |
          mkdir -p Config/Entitlements/Personal
          cat > Config/Entitlements/Personal/OpenGlasses.entitlements << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.homekit</key><true/>
            <key>com.apple.developer.kernel.increased-memory-limit</key><true/>
            <key>com.apple.security.application-groups</key>
            <array><string>${APP_GROUP}</string></array>
          </dict>
          </plist>
          EOF
          for t in GlassesActivityWidget OpenGlassesShareExtension; do
          cat > Config/Entitlements/Personal/$t.entitlements << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.application-groups</key>
            <array><string>${APP_GROUP}</string></array>
          </dict>
          </plist>
          EOF
          done

      - name: Write project.local.yml
        run: |
          cat > project.local.yml << EOF
          options:
            developmentTeam: ${{ secrets.ASC_TEAM_ID }}
          targets:
            OpenGlasses:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}
                  CODE_SIGN_ENTITLEMENTS: Config/Entitlements/Personal/OpenGlasses.entitlements
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
            GlassesActivityWidget:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}.GlassesActivityWidget
                  CODE_SIGN_ENTITLEMENTS: Config/Entitlements/Personal/GlassesActivityWidget.entitlements
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
            OpenGlassesShareExtension:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}.ShareExtension
                  CODE_SIGN_ENTITLEMENTS: Config/Entitlements/Personal/OpenGlassesShareExtension.entitlements
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
          EOF
          cat project.local.yml

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          chmod +x ./Scripts/generate-xcodeproj.sh || true
          OPENGLASSES_SKIP_WATCH=1 OPENGLASSES_SKIP_TESTS=1 ./Scripts/generate-xcodeproj.sh

      - name: Install and verify API key
        env:
          KEY: ${{ secrets.ASC_API_KEY }}
          KID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          python3 - << 'PY'
          import os, re, base64, sys, urllib.parse
          raw = os.environ['KEY']
          if '%' in raw:
              raw = urllib.parse.unquote(raw)
          m = re.search(r'BEGIN[^-]*KEY-----(.*?)-----END', raw, re.S)
          body = m.group(1) if m else raw
          body = re.sub(r'[^A-Za-z0-9+/=]', '', body)
          try:
              base64.b64decode(body, validate=True)
          except Exception as e:
              sys.exit("ASC_API_KEY secret is not a valid key: %s" % e)
          lines = [body[i:i+64] for i in range(0, len(body), 64)]
          pem = "-----BEGIN PRIVATE KEY-----\n" + "\n".join(lines) + "\n-----END PRIVATE KEY-----\n"
          open(os.path.expanduser("~/private_keys/AuthKey_%s.p8" % os.environ['KID'].strip()), "w").write(pem)
          print("key body length:", len(body))
          PY
          openssl pkey -in "$HOME/private_keys/AuthKey_${KID}.p8" -noout && echo "KEY OK"

      - name: Test Apple credentials
        env:
          KID: ${{ secrets.ASC_KEY_ID }}
          ISS: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          pip3 install pyjwt cryptography --quiet --break-system-packages 2>/dev/null || pip3 install pyjwt cryptography --quiet
          python3 - << 'PY'
          import jwt, time, os, urllib.request, sys
          kid, iss = os.environ['KID'].strip(), os.environ['ISS'].strip()
          key = open(os.path.expanduser("~/private_keys/AuthKey_%s.p8" % kid)).read()
          now = int(time.time())
          tok = jwt.encode({"iss": iss, "iat": now, "exp": now+600,
                            "aud": "appstoreconnect-v1"}, key,
                           algorithm="ES256", headers={"kid": kid})
          base = "https://api.appstoreconnect.apple.com/v1/"
          results = {}
          for ep in ["apps", "certificates", "bundleIds", "profiles", "devices"]:
              req = urllib.request.Request(base + ep + "?limit=1",
                                           headers={"Authorization": "Bearer " + tok})
              try:
                  urllib.request.urlopen(req)
                  print("OK   ", ep)
                  results[ep] = True
              except Exception as e:
                  print("FAIL ", ep, "->", getattr(e, 'code', e))
                  results[ep] = False
          if not results.get("profiles") or not results.get("certificates"):
              sys.exit("Key lacks Certificates/Profiles access — create a TEAM key with Admin role.")
          PY

      - name: Archive
        run: |
          xcodebuild archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OpenGlasses.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Export and upload to TestFlight
        run: |
          cat > ExportOptions.upload.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${{ secrets.ASC_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/OpenGlasses.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.upload.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"
