name: TestFlight

on:
  workflow_dispatch:

env:
  BUNDLE_PREFIX: com.soheil.openglasses
  APP_GROUP: group.com.soheil.openglasses

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Fastlane
        run: brew install fastlane

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build API key files
        env:
          KEY: ${{ secrets.ASC_API_KEY }}
          KID: ${{ secrets.ASC_KEY_ID }}
          ISS: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          python3 - << 'PY'
          import os, re, base64, json, urllib.parse
          raw = os.environ['KEY']
          if '%' in raw: raw = urllib.parse.unquote(raw)
          m = re.search(r'BEGIN[^-]*KEY-----(.*?)-----END', raw, re.S)
          body = re.sub(r'[^A-Za-z0-9+/=]', '', m.group(1) if m else raw)
          base64.b64decode(body, validate=True)
          pem = "-----BEGIN PRIVATE KEY-----\n" + "\n".join(
                body[i:i+64] for i in range(0, len(body), 64)) + "\n-----END PRIVATE KEY-----\n"
          json.dump({"key_id": os.environ['KID'].strip(),
                     "issuer_id": os.environ['ISS'].strip(),
                     "key": pem, "duration": 1200, "in_house": False},
                    open("asc_key.json", "w"))
          print("API key JSON ready")
          PY

      - name: Patch project spec (app group + remove CarPlay)
        run: |
          grep -rl "group.com.openglasses.app" \
            --include="*.swift" --include="*.plist" --include="*.yml" \
            --include="*.entitlements" --exclude-dir=.git . | while read -r f; do
            sed -i '' "s|group\.com\.openglasses\.app|${APP_GROUP}|g" "$f"
            echo "patched: $f"
          done
          sed -i '' '/carplay-voice-based-conversation/d' project.base.yml
          echo "--- entitlement keys now in project.base.yml:"
          grep -n "com.apple" project.base.yml || true

      - name: Create keychain (fixed path + permissions)
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p ci "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p ci "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KEYCHAIN_PATH"

      - name: Create certificate and profiles (fixed + debug + both paths)
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles

          fastlane run get_certificates \
            api_key_path:asc_key.json \
            development:false \
            keychain_path:"$HOME/Library/Keychains/build.keychain-db" \
            keychain_password:ci \
            output_path:./certs

          for id in "${BUNDLE_PREFIX}" "${BUNDLE_PREFIX}.GlassesActivityWidget" "${BUNDLE_PREFIX}.ShareExtension"; do
            fastlane run get_provisioning_profile \
              api_key_path:asc_key.json \
              app_identifier:"$id" \
              provisioning_name:"CI AppStore $id" \
              output_path:./profiles \
              force:true
          done

          # نصب درست پروفایل‌ها (fastlane + هر دو مسیر)
          for profile in ./profiles/*.mobileprovision; do
            if [ -f "$profile" ]; then
              echo "Installing $(basename "$profile")"
              fastlane run install_provisioning_profile path:"$profile" || true
              cp "$profile" ~/Library/MobileDevice/Provisioning\ Profiles/ || true
              cp "$profile" ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ || true
            fi
          done

          echo "=== Installed profiles (debug) ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          ls -la ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ || true

          echo "=== Profile names inside files ==="
          for f in ./profiles/*.mobileprovision; do
            echo "File: $(basename "$f")"
            security cms -D -i "$f" 2>/dev/null | grep -E "Name|UUID|TeamName" || true
          done

          security find-identity -v -p codesigning build.keychain

      - name: Extract Provisioning Profile UUIDs (most reliable fix)
        run: |
          get_uuid() {
            security cms -D -i "$1" 2>/dev/null | plutil -extract UUID raw -o - - 2>/dev/null || echo ""
          }

          MAIN_UUID=$(get_uuid "./profiles/${BUNDLE_PREFIX}.mobileprovision" || get_uuid ./profiles/*.mobileprovision)
          WIDGET_UUID=$(get_uuid "./profiles/${BUNDLE_PREFIX}.GlassesActivityWidget.mobileprovision")
          SHARE_UUID=$(get_uuid "./profiles/${BUNDLE_PREFIX}.ShareExtension.mobileprovision")

          echo "MAIN_UUID=$MAIN_UUID" >> $GITHUB_ENV
          echo "WIDGET_UUID=$WIDGET_UUID" >> $GITHUB_ENV
          echo "SHARE_UUID=$SHARE_UUID" >> $GITHUB_ENV

          echo "=== UUIDs extracted ==="
          echo "Main: $MAIN_UUID"
          echo "Widget: $WIDGET_UUID"
          echo "Share: $SHARE_UUID"

      - name: Write project.local.yml (now uses UUID)
        run: |
          cat > project.local.yml << EOF
          options:
            developmentTeam: ${{ secrets.ASC_TEAM_ID }}
          targets:
            OpenGlasses:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  PROVISIONING_PROFILE: "${MAIN_UUID}"
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
            GlassesActivityWidget:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}.GlassesActivityWidget
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  PROVISIONING_PROFILE: "${WIDGET_UUID}"
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
            OpenGlassesShareExtension:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}.ShareExtension
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  PROVISIONING_PROFILE: "${SHARE_UUID}"
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
          EOF
          cat project.local.yml

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          chmod +x ./Scripts/generate-xcodeproj.sh || true
          OPENGLASSES_SKIP_WATCH=1 OPENGLASSES_SKIP_TESTS=1 ./Scripts/generate-xcodeproj.sh

      - name: Archive (with explicit signing overrides)
        run: |
          xcodebuild archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OpenGlasses.xcarchive \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.ASC_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db" \
            | xcpretty || true

      # بقیه مراحل (Export IPA, Upload to TestFlight, artifact) دقیقاً مثل قبل هستن
      - name: Export IPA
        run: |
          cat > ExportOptions.upload.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.ASC_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_PREFIX}</key><string>CI AppStore ${BUNDLE_PREFIX}</string>
              <key>${BUNDLE_PREFIX}.GlassesActivityWidget</key><string>CI AppStore ${BUNDLE_PREFIX}.GlassesActivityWidget</string>
              <key>${BUNDLE_PREFIX}.ShareExtension</key><string>CI AppStore ${BUNDLE_PREFIX}.ShareExtension</string>
            </dict>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/OpenGlasses.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.upload.plist

      - name: Upload to TestFlight
        run: |
          fastlane run upload_to_testflight \
            api_key_path:asc_key.json \
            ipa:"$(ls build/export/*.ipa)" \
            skip_waiting_for_build_processing:true

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: build/export/*.ipa
          if-no-files-found: ignore
