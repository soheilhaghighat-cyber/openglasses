name: TestFlight

on:
  workflow_dispatch:

env:
  BUNDLE_PREFIX: com.soheil.openglasses
  APP_GROUP: group.com.soheil.openglasses

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build API key file
        env:
          KEY: ${{ secrets.ASC_API_KEY }}
          KID: ${{ secrets.ASC_KEY_ID }}
          ISS: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          python3 - << 'PY'
          import os, re, base64, json, urllib.parse
          raw = os.environ['KEY']
          if '%' in raw: raw = urllib.parse.unquote(raw)
          m = re.search(r'BEGIN[^-]*KEY-----(.*?)-----END', raw, re.S)
          body = re.sub(r'[^A-Za-z0-9+/=]', '', m.group(1) if m else raw)
          base64.b64decode(body, validate=True)
          pem = "-----BEGIN PRIVATE KEY-----\n" + "\n".join(
                body[i:i+64] for i in range(0, len(body), 64)) + "\n-----END PRIVATE KEY-----\n"
          json.dump({"key_id": os.environ['KID'].strip(),
                     "issuer_id": os.environ['ISS'].strip(),
                     "key": pem, "duration": 1200, "in_house": False},
                    open("asc_key.json", "w"))
          print("API key ready")
          PY

      - name: Patch app group and remove CarPlay
        run: |
          grep -rl "group.com.openglasses.app" \
            --include="*.swift" --include="*.plist" --include="*.yml" \
            --include="*.entitlements" --exclude-dir=.git . | while read -r f; do
            sed -i '' "s|group\.com\.openglasses\.app|${APP_GROUP}|g" "$f"
          done
          sed -i '' '/carplay-voice-based-conversation/d' project.base.yml
          echo "remaining old group refs:"
          grep -rn "group.com.openglasses.app" --exclude-dir=.git . || echo "none"

      - name: Create keychain
        run: |
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db

      - name: Create certificate and profiles
        run: |
          fastlane run get_certificates \
            api_key_path:asc_key.json \
            development:false \
            keychain_path:"$HOME/Library/Keychains/build.keychain-db" \
            keychain_password:ci \
            output_path:./certs
          for id in "${BUNDLE_PREFIX}" "${BUNDLE_PREFIX}.GlassesActivityWidget" "${BUNDLE_PREFIX}.ShareExtension"; do
            fastlane run get_provisioning_profile \
              api_key_path:asc_key.json \
              app_identifier:"$id" \
              provisioning_name:"CI AppStore $id" \
              output_path:./profiles \
              force:true
          done
          security find-identity -v -p codesigning build.keychain

      - name: Install profiles and read real values
        run: |
          OLD="$HOME/Library/MobileDevice/Provisioning Profiles"
          NEW="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$OLD" "$NEW"
          rm -f profile_map.json
          python3 - << 'PY'
          import glob, json, subprocess, plistlib, os, sys
          m = {}
          old = os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles")
          new = os.path.expanduser("~/Library/Developer/Xcode/UserData/Provisioning Profiles")
          files = glob.glob("./profiles/*.mobileprovision")
          if not files: sys.exit("No profiles were created by fastlane.")
          for f in files:
              raw = subprocess.check_output(["security", "cms", "-D", "-i", f])
              d = plistlib.loads(raw)
              appid = d["Entitlements"]["application-identifier"]
              bid = appid.split(".", 1)[1]
              m[bid] = {"name": d["Name"], "uuid": d["UUID"]}
              for dest in (old, new):
                  open(os.path.join(dest, d["UUID"] + ".mobileprovision"), "wb").write(open(f, "rb").read())
              print("installed:", bid, "| name:", d["Name"], "| uuid:", d["UUID"])
          json.dump(m, open("profile_map.json", "w"))
          PY

      - name: Write signing config from real profiles
        env:
          TEAM: ${{ secrets.ASC_TEAM_ID }}
          RUN: ${{ github.run_number }}
        run: |
          python3 - << 'PY'
          import json, os, sys
          m = json.load(open("profile_map.json"))
          team, prefix, run = os.environ['TEAM'], os.environ['BUNDLE_PREFIX'], os.environ['RUN']
          targets = {"OpenGlasses": prefix,
                     "GlassesActivityWidget": prefix + ".GlassesActivityWidget",
                     "OpenGlassesShareExtension": prefix + ".ShareExtension"}
          for bid in targets.values():
              if bid not in m: sys.exit("No profile found for " + bid)
          y = ["options:", "  developmentTeam: %s" % team, "targets:"]
          for t, bid in targets.items():
              y += ["  %s:" % t, "    settings:", "      base:",
                    "        DEVELOPMENT_TEAM: %s" % team,
                    "        PRODUCT_BUNDLE_IDENTIFIER: %s" % bid,
                    "        CODE_SIGN_STYLE: Manual",
                    '        CODE_SIGN_IDENTITY: "Apple Distribution"',
                    '        PROVISIONING_PROFILE_SPECIFIER: "%s"' % m[bid]["uuid"],
                    '        CURRENT_PROJECT_VERSION: "%s"' % run]
          open("project.local.yml", "w").write("\n".join(y) + "\n")
          p = ['<?xml version="1.0" encoding="UTF-8"?>',
               '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">',
               '<plist version="1.0">', '<dict>',
               '<key>method</key><string>app-store-connect</string>',
               '<key>teamID</key><string>%s</string>' % team,
               '<key>signingStyle</key><string>manual</string>',
               '<key>signingCertificate</key><string>Apple Distribution</string>',
               '<key>provisioningProfiles</key>', '<dict>']
          for bid in targets.values():
              p.append('<key>%s</key><string>%s</string>' % (bid, m[bid]["name"]))
          p += ['</dict>', '<key>uploadSymbols</key><true/>', '</dict>', '</plist>']
          open("ExportOptions.upload.plist", "w").write("\n".join(p) + "\n")
          print("signing config written")
          PY
          cat project.local.yml

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          chmod +x ./Scripts/generate-xcodeproj.sh || true
          OPENGLASSES_SKIP_WATCH=1 OPENGLASSES_SKIP_TESTS=1 ./Scripts/generate-xcodeproj.sh

      - name: Archive
        run: |
          xcodebuild archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OpenGlasses.xcarchive \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/OpenGlasses.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.upload.plist

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: build/export/*.ipa
          if-no-files-found: ignore

      - name: Upload to TestFlight
        run: |
          fastlane run upload_to_testflight \
            api_key_path:asc_key.json \
            ipa:"$(ls build/export/*.ipa)" \
            skip_waiting_for_build_processing:true
