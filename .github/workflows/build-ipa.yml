name: Build iOS App

on:
  workflow_dispatch: 
  pull_request:
  push:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository (With LFS for Frameworks)
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Force Stable Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Install dependencies
        run: |
          brew install xcodegen
          pip3 install pyyaml --break-system-packages

      - name: Deep Clean Watch, Widgets & Entitlements
        run: |
          cat << 'EOF' > fix_yaml.py
          import yaml
          with open('project.base.yml', 'r') as f:
              data = yaml.safe_load(f)
              
          targets_to_remove = ['OpenGlassesWatch', 'OpenGlassesWatchWidget', 'OpenGlassesShareExtension', 'GlassesActivityWidget']
          
          if 'targets' in data:
              for t in targets_to_remove:
                  data['targets'].pop(t, None)
              for t_name, t_data in data['targets'].items():
                  if isinstance(t_data, dict):
                      if 'dependencies' in t_data:
                          t_data['dependencies'] = [
                              d for d in t_data['dependencies'] 
                              if not (isinstance(d, dict) and d.get('target') in targets_to_remove)
                              and not (isinstance(d, str) and d in targets_to_remove)
                          ]
                      t_data.pop('entitlements', None)
                      
          if 'schemes' in data:
              for s_name, s_data in data['schemes'].items():
                  if isinstance(s_data, dict) and 'build' in s_data and 'targets' in s_data['build']:
                      targets = s_data['build']['targets']
                      if isinstance(targets, dict):
                          for t in targets_to_remove:
                              targets.pop(t, None)
                      elif isinstance(targets, list):
                          s_data['build']['targets'] = [
                              t for t in targets 
                              if not (isinstance(t, str) and t in targets_to_remove)
                              and not (isinstance(t, dict) and list(t.keys())[0] in targets_to_remove)
                          ]
                  
          with open('project.base.yml', 'w') as f:
              yaml.dump(data, f)
          EOF
          python3 fix_yaml.py

      - name: Generate Xcode Project
        run: ./Scripts/generate-xcodeproj.sh

      - name: Build the app (Unsigned)
        run: |
          xcodebuild clean archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath unsigned.xcarchive \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 

      - name: Package into IPA
        if: success()
        run: |
          mkdir -p Payload
          mv unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r OpenGlasses.ipa Payload

      - name: Upload Artifact (IPA)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: OpenGlasses.ipa
