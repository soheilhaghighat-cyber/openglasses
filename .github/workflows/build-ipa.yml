name: Build OpenGlasses iOS App

on:
  workflow_dispatch:

jobs:
  build_ios:
    name: Build and Export Unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install xcodegen via Homebrew
        run: brew install xcodegen

      - name: Generate Xcode Project structure
        run: |
          chmod +x./Scripts/generate-xcodeproj.sh
         ./Scripts/generate-xcodeproj.sh

      - name: Build and Archive (Bypassing Code Sign)
        run: |
          xcodebuild clean archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/OpenGlasses.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Extract and Package IPA Payload
        run: |
          mkdir -p Payload
          mv $RUNNER_TEMP/OpenGlasses.xcarchive/Products/Applications/OpenGlasses.app Payload/
          zip -r -9 OpenGlasses.ipa Payload/

      - name: Upload IPA Artifact to Cloud
        uses: actions/upload-artifact@v3
        with:
          name: OpenGlasses-Artifact
          path: OpenGlasses.ipa
          retention-days: 7
