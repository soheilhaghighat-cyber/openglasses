name: Build unsigned IPA

on:
  workflow_dispatch:   # اجرای دستی از تب Actions

jobs:
  build:
    runs-on: macos-latest   # مکِ مجازی رایگان گیت‌هاب
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)

      - name: Build archive (no signing)
        run: |
          xcodebuild archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OpenGlasses.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r build/OpenGlasses.xcarchive/Products/Applications/OpenGlasses.app Payload/
          zip -r OpenGlasses-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: OpenGlasses-unsigned.ipa
