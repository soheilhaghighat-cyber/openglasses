name: Build unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo contents (debug)
        run: ls -la && find . -maxdepth 2 -name "*.xcodeproj" -o -maxdepth 2 -name "*.xcworkspace" -o -maxdepth 2 -name "project.yml" -o -maxdepth 2 -name "Package.swift"

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: List schemes (debug)
        run: xcodebuild -list -project OpenGlasses.xcodeproj

      - name: Build archive (no signing)
        run: |
          xcodebuild archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OpenGlasses.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r build/OpenGlasses.xcarchive/Products/Applications/*.app Payload/
          zip -r OpenGlasses-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: OpenGlasses-unsigned.ipa
