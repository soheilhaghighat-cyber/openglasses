name: TestFlight

on:
  workflow_dispatch:

env:
  BUNDLE_PREFIX: com.soheil.openglasses
  APP_GROUP: group.com.soheil.openglasses

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build API key files
        env:
          KEY: ${{ secrets.ASC_API_KEY }}
          KID: ${{ secrets.ASC_KEY_ID }}
          ISS: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          python3 - << 'PY'
          import os, re, base64, json, sys, urllib.parse
          raw = os.environ['KEY']
          if '%' in raw: raw = urllib.parse.unquote(raw)
          m = re.search(r'BEGIN[^-]*KEY-----(.*?)-----END', raw, re.S)
          body = re.sub(r'[^A-Za-z0-9+/=]', '', m.group(1) if m else raw)
          base64.b64decode(body, validate=True)
          pem = "-----BEGIN PRIVATE KEY-----\n" + "\n".join(
                body[i:i+64] for i in range(0, len(body), 64)) + "\n-----END PRIVATE KEY-----\n"
          json.dump({"key_id": os.environ['KID'].strip(),
                     "issuer_id": os.environ['ISS'].strip(),
                     "key": pem, "duration": 1200, "in_house": False},
                    open("asc_key.json", "w"))
          print("API key JSON ready")
          PY

      - name: Create keychain
        run: |
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Create certificate and profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          fastlane run get_certificates \
            api_key_path:asc_key.json \
            development:false \
            keychain_path:"$HOME/Library/Keychains/build.keychain-db" \
            keychain_password:ci \
            output_path:./certs
          for id in "${BUNDLE_PREFIX}" "${BUNDLE_PREFIX}.GlassesActivityWidget" "${BUNDLE_PREFIX}.ShareExtension"; do
            fastlane run get_provisioning_profile \
              api_key_path:asc_key.json \
              app_identifier:"$id" \
              provisioning_name:"CI AppStore $id" \
              output_path:./profiles
          done
          cp ./profiles/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          security find-identity -v -p codesigning build.keychain

      - name: Write personal entitlements
        run: |
          mkdir -p Config/Entitlements/Personal
          cat > Config/Entitlements/Personal/OpenGlasses.entitlements << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.homekit</key><true/>
            <key>com.apple.developer.kernel.increased-memory-limit</key><true/>
            <key>com.apple.security.application-groups</key>
            <array><string>${APP_GROUP}</string></array>
          </dict>
          </plist>
          EOF
          for t in GlassesActivityWidget OpenGlassesShareExtension; do
          cat > Config/Entitlements/Personal/$t.entitlements << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.application-groups</key>
            <array><string>${APP_GROUP}</string></array>
          </dict>
          </plist>
          EOF
          done

      - name: Rewrite app group in sources
        run: |
          grep -rl "group.com.openglasses.app" --include="*.swift" --include="*.plist" . | while read -r f; do
            sed -i '' "s|group\.com\.openglasses\.app|${APP_GROUP}|g" "$f"
          done

      - name: Write project.local.yml
        run: |
          cat > project.local.yml << EOF
          options:
            developmentTeam: ${{ secrets.ASC_TEAM_ID }}
          targets:
            OpenGlasses:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}
                  CODE_SIGN_ENTITLEMENTS: Config/Entitlements/Personal/OpenGlasses.entitlements
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  PROVISIONING_PROFILE_SPECIFIER: "CI AppStore ${BUNDLE_PREFIX}"
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
            GlassesActivityWidget:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}.GlassesActivityWidget
                  CODE_SIGN_ENTITLEMENTS: Config/Entitlements/Personal/GlassesActivityWidget.entitlements
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  PROVISIONING_PROFILE_SPECIFIER: "CI AppStore ${BUNDLE_PREFIX}.GlassesActivityWidget"
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
            OpenGlassesShareExtension:
              settings:
                base:
                  DEVELOPMENT_TEAM: ${{ secrets.ASC_TEAM_ID }}
                  PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_PREFIX}.ShareExtension
                  CODE_SIGN_ENTITLEMENTS: Config/Entitlements/Personal/OpenGlassesShareExtension.entitlements
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  PROVISIONING_PROFILE_SPECIFIER: "CI AppStore ${BUNDLE_PREFIX}.ShareExtension"
                  CURRENT_PROJECT_VERSION: "${{ github.run_number }}"
          EOF
          cat project.local.yml

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          chmod +x ./Scripts/generate-xcodeproj.sh || true
          OPENGLASSES_SKIP_WATCH=1 OPENGLASSES_SKIP_TESTS=1 ./Scripts/generate-xcodeproj.sh

      - name: Archive
        run: |
          xcodebuild archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OpenGlasses.xcarchive \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db"

      - name: Export IPA
        run: |
          cat > ExportOptions.upload.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.ASC_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_PREFIX}</key><string>CI AppStore ${BUNDLE_PREFIX}</string>
              <key>${BUNDLE_PREFIX}.GlassesActivityWidget</key><string>CI AppStore ${BUNDLE_PREFIX}.GlassesActivityWidget</string>
              <key>${BUNDLE_PREFIX}.ShareExtension</key><string>CI AppStore ${BUNDLE_PREFIX}.ShareExtension</string>
            </dict>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/OpenGlasses.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.upload.plist

      - name: Upload to TestFlight
        run: |
          fastlane run upload_to_testflight \
            api_key_path:asc_key.json \
            ipa:"$(ls build/export/*.ipa)" \
            skip_waiting_for_build_processing:true

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: build/export/*.ipa
          if-no-files-found: ignore
