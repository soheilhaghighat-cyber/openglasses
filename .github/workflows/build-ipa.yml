name: Build iOS App

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen
          pip3 install pyyaml --break-system-packages

      - name: Remove Watch and Widget Targets (Fixes Signing Errors)
        run: |
          python3 -c "
          import yaml
          with open('project.base.yml', 'r') as f:
              data = yaml.safe_load(f)
          targets_to_remove = ['OpenGlassesWatch', 'OpenGlassesWatchWidget', 'OpenGlassesShareExtension', 'GlassesActivityWidget']
          if 'targets' in data:
              for t in targets_to_remove:
                  if t in data['targets']:
                      del data['targets'][t]
              if 'OpenGlasses' in data['targets']:
                  deps = data['targets']['OpenGlasses'].get('dependencies', [])
                  data['targets']['OpenGlasses']['dependencies'] = [d for d in deps if d.get('target') not in targets_to_remove]
          with open('project.base.yml', 'w') as f:
              yaml.dump(data, f)
          "

      - name: Generate Xcode Project
        run: ./Scripts/generate-xcodeproj.sh

      - name: Build the app (Unsigned)
        run: |
          xcodebuild clean archive \
            -project OpenGlasses.xcodeproj \
            -scheme OpenGlasses \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath unsigned.xcarchive \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r OpenGlasses.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenGlasses-IPA
          path: OpenGlasses.ipa
