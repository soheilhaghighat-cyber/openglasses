name: OpenGlasses
settings:
  base:
    DEVELOPMENT_TEAM: B9L8ANZQZX
    DEAD_CODE_STRIPPING: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
options:
  bundleIdPrefix: com.openglasses
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - zh-Hant
    - ja
    - ko
    - cs
    - pl
    - pt-BR
    - pt-PT
    - es
    - es-MX
    - fr
    - fr-CA
    - de
    - it
    - nl
    - th
    - ar
    - hi
    - ru
    - sv
    - fi
    - uk
    - el
    - tr
    - da
    - nb
    - ro
    - hu
    - hr
    - sk
    - ms
    - vi
    - id
    - ca

packages:
  meta-wearables-dat-ios:
    url: https://github.com/facebook/meta-wearables-dat-ios.git
    from: "0.3.0"
  HaishinKit:
    url: https://github.com/shogo4405/HaishinKit.swift.git
    from: "2.0.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    branch: main
  SystemNotification:
    url: https://github.com/danielsaidi/SystemNotification.git
    from: "1.0.0"

targets:
  OpenGlasses:
    type: application
    platform: iOS
    sources:
      - path: OpenGlasses/Sources
    entitlements:
      path: OpenGlasses/OpenGlasses.entitlements
      properties:
        com.apple.developer.homekit: true
        com.apple.developer.carplay-voice-based-conversation: true
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app
        MARKETING_VERSION: "2.2.0"
        CURRENT_PROJECT_VERSION: "9"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: B9L8ANZQZX
        INFOPLIST_FILE: OpenGlasses/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "OpenGlasses"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        SKIP_INSTALL: "NO"
    dependencies:
      - package: meta-wearables-dat-ios
        product: MWDATCore
      - package: meta-wearables-dat-ios
        product: MWDATCamera
      - package: HaishinKit
        product: HaishinKit
      - package: HaishinKit
        product: RTMPHaishinKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXVLM
      - package: SystemNotification
        product: SystemNotification
      - target: GlassesActivityWidget
      - target: OpenGlassesWatch

  GlassesActivityWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: GlassesActivityWidget
      - path: OpenGlasses/Sources/Models/GlassesActivityAttributes.swift
    info:
      path: GlassesActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: "OpenGlasses"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app.GlassesActivityWidget
        MARKETING_VERSION: "2.2.0"
        CURRENT_PROJECT_VERSION: "9"
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: B9L8ANZQZX

  OpenGlassesWatch:
    type: application
    platform: watchOS
    sources:
      - path: OpenGlassesWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app.watchkitapp
        MARKETING_VERSION: "2.2.0"
        CURRENT_PROJECT_VERSION: "9"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: B9L8ANZQZX
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: OpenGlassesWatch/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "OpenGlasses"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: "YES"

schemes:
  OpenGlasses:
    build:
      targets:
        OpenGlasses: all
        GlassesActivityWidget: all
        OpenGlassesWatch: all
    run:
      config: Debug
      debugEnabled: true
      askForAppToLaunch: false
      launchAutomaticallySubstyle: 2
    archive:
      config: Release
  OpenGlassesWatch:
    build:
      targets:
        OpenGlassesWatch: all
    run:
      config: Debug
